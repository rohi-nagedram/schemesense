<!DOCTYPE html>
<html>

<head>
<title>SchemeSense – AI Government Scheme Finder</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

input{
padding:10px;
margin:6px;
width:240px;
}

button{
padding:10px 20px;
background:#f39c12;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin:6px;
}

.card{
background:white;
padding:18px;
margin:18px auto;
width:340px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.error{
color:red;
font-size:13px;
height:16px;
}

</style>

</head>

<body>

<h1>Find Government Schemes</h1>

<input id="age" placeholder="Enter Age">
<div id="ageError" class="error"></div>

<input id="income" placeholder="Enter Income">
<div id="incomeError" class="error"></div>

<input id="state" placeholder="Enter State">
<div id="stateError" class="error"></div>

<br>

<button onclick="checkSchemes()">Check Eligibility</button>
<button onclick="startVoice()">🎤 Speak Details</button>

<div id="results"></div>

<script>

const API_URL="https://965alqno7a.execute-api.us-east-1.amazonaws.com/prod/check-eligibility"

function validate(){

let age=document.getElementById("age").value
let income=document.getElementById("income").value
let state=document.getElementById("state").value

let valid=true

if(!/^\d+$/.test(age)){
document.getElementById("ageError").innerText="Enter valid age"
valid=false
}else{
document.getElementById("ageError").innerText=""
}

if(!/^\d+$/.test(income)){
document.getElementById("incomeError").innerText="Enter valid income"
valid=false
}else{
document.getElementById("incomeError").innerText=""
}

if(/\d/.test(state)){
document.getElementById("stateError").innerText="State cannot contain numbers"
valid=false
}else{
document.getElementById("stateError").innerText=""
}

return valid

}

async function checkSchemes(){

if(!validate()) return

let age=parseInt(document.getElementById("age").value)
let income=parseInt(document.getElementById("income").value)
let state=document.getElementById("state").value

let response=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({age:age,income:income,state:state})
})

let data=await response.json()

displayResults(data)

}

function generateAIExplanation(age,income,state,schemes){

let text="Based on your profile our AI analyzed your eligibility. "

text+="Your age is "+age+", your income is "+income+", and your state is "+state+". "

if(schemes.length>0){

text+="The most suitable scheme for you is "+schemes[0].scheme_name+". "

text+="This scheme matches your eligibility conditions."

}else{

text+="Currently no matching schemes were found."

}

return text

}

function displayResults(list){

let html=""

let age=document.getElementById("age").value
let income=document.getElementById("income").value
let state=document.getElementById("state").value

let aiText=generateAIExplanation(age,income,state,list)

html+=`
<div class="card" style="border:3px solid purple">
<h3>🤖 AI Recommendation</h3>
<p>${aiText}</p>
</div>
`

if(list.length>0){

let best=list[0]

html+=`
<div class="card" style="border:3px solid green">
<h3>⭐ Recommended Scheme</h3>
<h4>${best.scheme_name}</h4>
<p>${best.benefits}</p>
<p>${best.reason}</p>
<a href="${best.apply_link}" target="_blank">
<button>Apply</button>
</a>
</div>
`

}

list.slice(1).forEach(s=>{

html+=`
<div class="card">
<h3>${s.scheme_name}</h3>
<p>${s.benefits}</p>
<p>${s.reason}</p>
<a href="${s.apply_link}" target="_blank">
<button>Apply</button>
</a>
</div>
`

})

document.getElementById("results").innerHTML=html

if(list.length>0){

let summary="You qualify for "+list.length+" schemes. "

summary+="The best scheme for you is "+list[0].scheme_name

speakText(summary)

}

}

function startVoice(){

if(!('webkitSpeechRecognition' in window)){
alert("Speech recognition not supported")
return
}

const recognition=new webkitSpeechRecognition()

recognition.lang="en-IN"

recognition.start()

recognition.onresult=function(event){

let speech=event.results[0][0].transcript

let nums=speech.match(/\d+/g)

if(nums && nums.length>=2){

document.getElementById("age").value=nums[0]
document.getElementById("income").value=nums[1]

}

if(speech.toLowerCase().includes("andhra")){
document.getElementById("state").value="Andhra Pradesh"
}

if(speech.toLowerCase().includes("telangana")){
document.getElementById("state").value="Telangana"
}

}

}

function speakText(text){

const speech=new SpeechSynthesisUtterance()

speech.text=text

speech.lang="en-IN"

window.speechSynthesis.speak(speech)

}

</script>

</body>
</html>
