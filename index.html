<!DOCTYPE html><html>
<head>
<title>SchemeSense</title><style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

h1{
margin-bottom:30px;
}

input{
padding:10px;
margin:10px;
width:220px;
font-size:16px;
}

button{
padding:10px 20px;
background:#f39c12;
border:none;
color:white;
font-size:16px;
cursor:pointer;
margin:5px;
}

.card{
background:white;
margin:20px auto;
padding:20px;
width:320px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

</style></head><body><h1>Find Government Schemes</h1><input id="age" placeholder="Enter Age"><br>
<input id="income" placeholder="Enter Income"><br>
<input id="state" placeholder="Enter State"><br>

<button onclick="checkSchemes()">Check Eligibility</button>
<button onclick="startVoice()">🎤 Speak Details</button>

<div id="results"></div><script>

const API_URL="https://965alqno7a.execute-api.us-east-1.amazonaws.com/prod/check-eligibility"


async function checkSchemes(){

let age=document.getElementById("age").value
let income=document.getElementById("income").value
let state=document.getElementById("state").value

let response=await fetch(API_URL,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
age:Number(age),
income:Number(income),
state:state
})
})

let data=await response.json()

displayResults(data)

}


function displayResults(data){

let container=document.getElementById("results")
container.innerHTML=""

data.forEach(function(s){

container.innerHTML+=`

<div class="card">

<h3>${s.scheme_name}</h3>

<p>${s.benefits}</p>

<p>${s.reason}</p>

<a href="${s.apply_link}" target="_blank">
<button>Apply</button>
</a>

</div>

`

})

}



function startVoice(){

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition

if(!SpeechRecognition){
alert("Voice not supported in this browser")
return
}

const recognition=new SpeechRecognition()

recognition.lang="en-IN"

recognition.onresult=function(event){

let text=event.results[0][0].transcript.toLowerCase()

let ageMatch=text.match(/\d+/)
let incomeMatch=text.match(/\d{4,}/)

if(ageMatch){
document.getElementById("age").value=ageMatch[0]
}

if(incomeMatch){
document.getElementById("income").value=incomeMatch[0]
}

if(text.includes("andhra")){
document.getElementById("state").value="Andhra Pradesh"
}

if(text.includes("telangana")){
document.getElementById("state").value="Telangana"
}

}

recognition.onerror=function(){
alert("Voice recognition error")
}

recognition.start()

}

</script></body>
</html>
