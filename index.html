<!DOCTYPE html>
<html>

<head>

<title>SchemeSense</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

input{
padding:10px;
margin:5px;
width:220px;
font-size:16px;
}

button{
padding:10px 20px;
background:#f39c12;
border:none;
color:white;
font-size:16px;
cursor:pointer;
margin:5px;
}

.card{
background:white;
margin:20px auto;
padding:20px;
width:320px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.error{
color:red;
font-size:14px;
height:16px;
}

</style>

</head>

<body>

<select id="language" onchange="changeLanguage()">
<option value="en">English</option>
<option value="te">Telugu</option>
<option value="hi">Hindi</option>
</select>

<h1 id="title">Find Government Schemes</h1>

<div>
<input id="age" type="number" placeholder="Enter Age">
<div id="ageError" class="error"></div>
</div>

<div>
<input id="income" type="number" placeholder="Enter Income">
<div id="incomeError" class="error"></div>
</div>

<div>
<input id="state" placeholder="Enter State">
<div id="stateError" class="error"></div>
</div>

<button onclick="checkSchemes()" id="checkBtn">Check Eligibility</button>
<button onclick="startVoice()" id="voiceBtn">🎤 Speak Details</button>

<div id="results"></div>

<script>

const API_URL="https://965alqno7a.execute-api.us-east-1.amazonaws.com/prod/check-eligibility"


const langText={

en:{
title:"Find Government Schemes",
age:"Enter Age",
income:"Enter Income",
state:"Enter State",
check:"Check Eligibility",
voice:"Speak Details",
ageError:"Enter valid age number",
incomeError:"Enter valid income number",
stateError:"State cannot contain numbers"
},

te:{
title:"ప్రభుత్వ పథకాలు కనుగొనండి",
age:"వయస్సు నమోదు చేయండి",
income:"ఆదాయం నమోదు చేయండి",
state:"రాష్ట్రం నమోదు చేయండి",
check:"అర్హత తనిఖీ",
voice:"మాట్లాడండి",
ageError:"సరైన వయస్సు నమోదు చేయండి",
incomeError:"సరైన ఆదాయం నమోదు చేయండి",
stateError:"రాష్ట్రంలో సంఖ్యలు ఉండకూడదు"
},

hi:{
title:"सरकारी योजनाएं खोजें",
age:"आयु दर्ज करें",
income:"आय दर्ज करें",
state:"राज्य दर्ज करें",
check:"योग्यता जांचें",
voice:"बोलें",
ageError:"सही आयु दर्ज करें",
incomeError:"सही आय दर्ज करें",
stateError:"राज्य में संख्या नहीं होनी चाहिए"
}

}


function changeLanguage(){

let lang=document.getElementById("language").value
let t=langText[lang]

document.getElementById("title").innerText=t.title
document.getElementById("age").placeholder=t.age
document.getElementById("income").placeholder=t.income
document.getElementById("state").placeholder=t.state
document.getElementById("checkBtn").innerText=t.check
document.getElementById("voiceBtn").innerText="🎤 "+t.voice

document.getElementById("age").value=""
document.getElementById("income").value=""
document.getElementById("state").value=""

document.getElementById("results").innerHTML=""

clearErrors()

}


function clearErrors(){

document.getElementById("ageError").innerText=""
document.getElementById("incomeError").innerText=""
document.getElementById("stateError").innerText=""

}


function validate(){

clearErrors()

let lang=document.getElementById("language").value
let t=langText[lang]

let age=document.getElementById("age").value
let income=document.getElementById("income").value
let state=document.getElementById("state").value

let valid=true

if(!age || age<=0){

document.getElementById("ageError").innerText=t.ageError
valid=false

}

if(!income || income<=0){

document.getElementById("incomeError").innerText=t.incomeError
valid=false

}

if(/\d/.test(state)){

document.getElementById("stateError").innerText=t.stateError
valid=false

}

return valid

}


async function checkSchemes(){

if(!validate()) return

let age=parseInt(document.getElementById("age").value)
let income=parseInt(document.getElementById("income").value)
let state=document.getElementById("state").value

let response=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({age:age,income:income,state:state})
})

let data=await response.json()

displayResults(data)

}


function displayResults(list){

let html=""

list.forEach(s=>{

html+=`
<div class="card">
<h3>${s.scheme_name}</h3>
<p>${s.benefits}</p>
<p>${s.reason}</p>
<a href="${s.apply_link}" target="_blank">
<button>Apply</button>
</a>
</div>
`

})

document.getElementById("results").innerHTML=html

}


function startVoice(){

if(!('webkitSpeechRecognition'in window)){

alert("Speech not supported")
return

}

const recognition=new webkitSpeechRecognition()

recognition.lang="en-IN"
recognition.start()

recognition.onresult=function(event){

let speech=event.results[0][0].transcript.toLowerCase()

let nums=speech.match(/\d+/g)

if(nums && nums.length>=2){

document.getElementById("age").value=nums[0]
document.getElementById("income").value=nums[1]

}

if(speech.includes("andhra"))
document.getElementById("state").value="Andhra Pradesh"

if(speech.includes("telangana"))
document.getElementById("state").value="Telangana"

if(speech.includes("tamil"))
document.getElementById("state").value="Tamil Nadu"

}

}

</script>

</body>
</html>
