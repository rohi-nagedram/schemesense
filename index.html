<!DOCTYPE html>
<html>

<head>
<title>SchemeSense – AI Government Scheme Finder</title>

<style>

body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  text-align:center;
  padding:40px;
}

h1{
  margin-bottom:10px;
}

select{
  padding:8px;
  margin-bottom:20px;
}

input{
  padding:10px;
  margin:6px;
  width:240px;
  font-size:16px;
}

button{
  padding:10px 20px;
  background:#f39c12;
  border:none;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin:6px;
  border-radius:6px;
}

.card{
  background:white;
  margin:18px auto;
  padding:18px;
  width:340px;
  border-radius:10px;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.error{
  color:red;
  font-size:13px;
  height:16px;
}

</style>
</head>

<body>

<select id="language" onchange="changeLanguage()">
<option value="en">English</option>
<option value="te">Telugu</option>
<option value="hi">Hindi</option>
</select>

<h1 id="title">Find Government Schemes</h1>
<div>
<input id="age" placeholder="Enter Age" oninput="monitorInputs()">
<div id="ageError" class="error"></div>
</div>
<div>
<input id="income" placeholder="Enter Income" oninput="monitorInputs()">
<div id="incomeError" class="error"></div>
</div>  
<div>
<input id="state" list="statesList" placeholder="Enter State" oninput="monitorInputs()">
<datalist id="statesList">
<option value="Andhra Pradesh">
<option value="Arunachal Pradesh">
<option value="Assam">
<option value="Bihar">
<option value="Chhattisgarh">
<option value="Goa">
<option value="Gujarat">
<option value="Haryana">
<option value="Himachal Pradesh">
<option value="Jharkhand">
<option value="Karnataka">
<option value="Kerala">
<option value="Madhya Pradesh">
<option value="Maharashtra">
<option value="Manipur">
<option value="Meghalaya">
<option value="Mizoram">
<option value="Nagaland">
<option value="Odisha">
<option value="Punjab">
<option value="Rajasthan">
<option value="Sikkim">
<option value="Tamil Nadu">
<option value="Telangana">
<option value="Tripura">
<option value="Uttar Pradesh">
<option value="Uttarakhand">
<option value="West Bengal">
<option value="Delhi">
<option value="Jammu and Kashmir">
<option value="Ladakh">
<option value="Chandigarh">
<option value="Puducherry">
<option value="Lakshadweep">
<option value="Andaman and Nicobar Islands">
<option value="Dadra and Nagar Haveli and Daman and Diu">
</datalist>

<div id="stateError" class="error"></div>






<button onclick="checkSchemes()" id="checkBtn">Check Eligibility</button>
<button onclick="startVoice()" id="voiceBtn">🎤 Speak Details</button>

<p style="font-size:13px;color:gray">
Try saying:<br>
"My age 45 income 50000 Telangana"<br>
"నా వయస్సు నలభై ఐదు ఆదాయం యాభై వేల తెలంగాణ"<br>
"Meri umar paintalis hai meri aay pachaas hazaar hai Telangana"
</p>

<div id="results"></div>

<script>

// ---------------- API ----------------
const API_URL="https://965alqno7a.execute-api.us-east-1.amazonaws.com/prod/check-eligibility"

let voiceMode = false

const validStates = [
"Andhra Pradesh","Arunachal Pradesh","Assam","Bihar","Chhattisgarh","Goa",
"Gujarat","Haryana","Himachal Pradesh","Jharkhand","Karnataka","Kerala",
"Madhya Pradesh","Maharashtra","Manipur","Meghalaya","Mizoram","Nagaland",
"Odisha","Punjab","Rajasthan","Sikkim","Tamil Nadu","Telangana","Tripura",
"Uttar Pradesh","Uttarakhand","West Bengal","Delhi","Jammu and Kashmir",
"Ladakh","Chandigarh","Puducherry","Lakshadweep",
"Andaman and Nicobar Islands",
"Dadra and Nagar Haveli and Daman and Diu"
]


// ---------------- Language dictionary ----------------

const translations={

en:{
title:"Find Government Schemes",
age:"Enter Age",
income:"Enter Income",
state:"Enter State",
check:"Check Eligibility",
speak:"Speak Details",
ageError:"Enter valid age number",
incomeError:"Enter valid income number",
stateError:"State cannot contain numbers"
},

te:{
title:"ప్రభుత్వ పథకాలు కనుగొనండి",
age:"వయస్సు నమోదు చేయండి",
income:"ఆదాయం నమోదు చేయండి",
state:"రాష్ట్రం నమోదు చేయండి",
check:"అర్హత తనిఖీ",
speak:"మాట్లాడండి",
ageError:"సరైన వయస్సు నమోదు చేయండి",
incomeError:"సరైన ఆదాయం నమోదు చేయండి",
stateError:"రాష్ట్రంలో సంఖ్యలు ఉండకూడదు"
},

hi:{
title:"सरकारी योजनाएँ खोजें",
age:"आयु दर्ज करें",
income:"आय दर्ज करें",
state:"राज्य दर्ज करें",
check:"योग्यता जांचें",
speak:"बोलें",
ageError:"सही आयु दर्ज करें",
incomeError:"सही आय दर्ज करें",
stateError:"राज्य में संख्या नहीं होनी चाहिए"
}

}


// ---------------- Language change ----------------

function changeLanguage(){

let lang=document.getElementById("language").value
let t=translations[lang]

document.getElementById("title").innerText=t.title
document.getElementById("age").placeholder=t.age
document.getElementById("income").placeholder=t.income
document.getElementById("state").placeholder=t.state

document.getElementById("checkBtn").innerText=t.check
document.getElementById("voiceBtn").innerText="🎤 "+t.speak

document.getElementById("age").value=""
document.getElementById("income").value=""
document.getElementById("state").value=""

document.getElementById("results").innerHTML=""

clearErrors()

}


// ---------------- Validation ----------------

function clearErrors(){

document.getElementById("ageError").innerText=""
document.getElementById("incomeError").innerText=""
document.getElementById("stateError").innerText=""

}
  
async function checkSchemes(){

if(!validate()) return

clearErrors()

let lang=document.getElementById("language").value
let t=translations[lang]

let age=document.getElementById("age").value
let income=document.getElementById("income").value
let state=document.getElementById("state").value

let valid=true

if(!/^\d+$/.test(age)){
document.getElementById("ageError").innerText=t.ageError
valid=false
}

if(!/^\d+$/.test(income)){
document.getElementById("incomeError").innerText=t.incomeError
valid=false
}

/* replace old state validation with this */

if(!validStates.includes(state)){
document.getElementById("stateError").innerText="Enter a valid Indian state"
valid=false
}

return valid

}



// ---------------- Fetch schemes ----------------
async function checkSchemes(){

clearErrors()

let ageInput = document.getElementById("age").value
let incomeInput = document.getElementById("income").value
let state = document.getElementById("state").value

// remove non-numeric characters (for manual typing like 50,000 or 45 years)
let age = ageInput.replace(/\D/g,'')
let income = incomeInput.replace(/\D/g,'')

if(age === "" || income === "" || state === ""){
alert("Please fill Age, Income and State")
return
}

age = parseInt(age)
income = parseInt(income)

// loading message
document.getElementById("results").innerHTML =
"<div class='card'>🔎 Checking eligibility...</div>"

try{

let response = await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
age:age,
income:income,
state:state
})
})

let data = await response.json()

displayResults(data)

}catch(err){

document.getElementById("results").innerHTML =
"<div class='card'>Error calling API</div>"

}

}



// ---------------- Display schemes ----------------

function displayResults(list){

let html=""
html += `
<div class="card">
<b>${list.length} schemes found for your profile</b>
</div>
`
let age=document.getElementById("age").value
let income=document.getElementById("income").value
let state=document.getElementById("state").value

let aiText=generateAIExplanation(age,income,state,list)

html+=`
<div class="card" style="border:3px solid purple">
<h3>🤖 AI Analysis</h3>

<ul style="text-align:left">
<li>Age eligibility verified</li>
<li>Income eligibility verified</li>
<li>State scheme availability checked</li>
<li>Best scheme recommended based on conditions</li>
</ul>

<p>${aiText}</p>
</div>
`

if(list.length>0){

let best=list[0]

html+=`
<div class="card" style="border:3px solid green">
<h3>⭐ Recommended Scheme</h3>
<h4>${best.scheme_name}</h4>
<p>${best.benefits}</p>
<p>${best.reason}</p>
<a href="${best.apply_link}" target="_blank">
<button>Apply</button>
</a>
</div>
`

}

list.slice(1).forEach(s=>{

html+=`
<div class="card">
<h3>${s.scheme_name}</h3>
<p>${s.benefits}</p>
<p>${s.reason}</p>
<a href="${s.apply_link}" target="_blank">
<button>Apply</button>
</a>
</div>
`

})

document.getElementById("results").innerHTML=html

if(list.length>0){

let lang=document.getElementById("language").value
let summary=""

if(lang==="te"){

summary="మీకు మొత్తం "+list.length+" పథకాలకు అర్హత ఉంది. "
summary+="మీకు సరైన పథకం "+list[0].scheme_name

}

else if(lang==="hi"){

summary="आप "+list.length+" योजनाओं के लिए पात्र हैं। "
summary+="आपके लिए सबसे अच्छी योजना "+list[0].scheme_name

}

else{

summary="You qualify for "+list.length+" schemes. "
summary+="The best scheme for you is "+list[0].scheme_name

}

speakText(summary)

}

}


// ---------------- Clear results if inputs empty ----------------

function monitorInputs(){

let age=document.getElementById("age").value
let income=document.getElementById("income").value
let state=document.getElementById("state").value

if(age=="" && income=="" && state==""){
document.getElementById("results").innerHTML=""
}

}// ---------------- Telugu numbers ----------------

function teluguNumberToDigit(text){

const map = {
"సున్నా":0,
"ఒకటి":1,
"రెండు":2,
"మూడు":3,
"నాలుగు":4,
"ఐదు":5,
"ఆరు":6,
"ఏడు":7,
"ఎనిమిది":8,
"తొమ్మిది":9,
"పది":10,
"ఇరవై":20,
"ముప్పై":30,
"నలభై":40,
"యాభై":50,
"అరవై":60,
"డెబ్బై":70,
"ఎనభై":80,
"తొంభై":90
}

let words = text.split(" ")
let total = 0

words.forEach(w => {

if(map[w] !== undefined){
total += map[w]
}

if(w === "వేల" || w === "వెయ్యి"){
total = total * 1000
}

if(w === "లక్ష"){
total = total * 100000
}

})

return total
}
// ---------------- Hindi numbers ----------------

function hindiNumberToDigit(text){

const map = {

"ek":1,
"do":2,
"teen":3,
"char":4,
"paanch":5,
"chhe":6,
"saat":7,
"aath":8,
"nau":9,
"das":10,

"bees":20,
"pachis":25,
"tees":30,
"paintis":35,
"chalis":40,
"paintalis":45,
"pachaas":50

}

let words = text.split(" ")
let total = 0

words.forEach(w => {

if(map[w] !== undefined){
total += map[w]
}

if(w === "hazaar"){
total = total * 1000
}

if(w === "lakh"){
total = total * 100000
}

})

return total
  }


// ---------------- Voice input ----------------

function startVoice(){

if(!('webkitSpeechRecognition' in window)){
alert("Speech recognition not supported")
return
}

const recognition=new webkitSpeechRecognition()

let lang=document.getElementById("language").value

if(lang==="te") recognition.lang="te-IN"
else if(lang==="hi") recognition.lang="hi-IN"
else recognition.lang="en-IN"

recognition.start()
recognition.onresult = function(event){

voiceMode = true

let speech = event.results[0][0].transcript.toLowerCase()

let nums = speech.match(/\d+/g)

if(nums){
if(nums[0]) document.getElementById("age").value = nums[0]
if(nums[1]) document.getElementById("income").value = nums[1]
}

if(speech.includes("andhra") || speech.includes("ఆంధ్ర") || speech.includes("आंध्र")){
document.getElementById("state").value="Andhra Pradesh"
}

if(speech.includes("telangana") || speech.includes("తెలంగాణ") || speech.includes("तेलंगाना")){
document.getElementById("state").value="Telangana"
}

setTimeout(function(){

if(voiceMode){
checkSchemes()
voiceMode = false
}

},1000)

}
}

// ---------------- Voice output ----------------

function speakText(text){

const speech=new SpeechSynthesisUtterance()

speech.text=text
let lang=document.getElementById("language").value

if(lang==="te") speech.lang="te-IN"
else if(lang==="hi") speech.lang="hi-IN"
else speech.lang="en-IN"
window.speechSynthesis.speak(speech)
}


// ---------------- Local AI explanation ----------------

function generateAIExplanation(age,income,state,schemes){

let text="Based on your profile, our AI analyzed your eligibility. "

text+="Your age is "+age+", "
text+="your income is "+income+", "
text+="and your state is "+state+". "

text+="After checking government scheme conditions, "

if(schemes.length>0){
text+="the most suitable scheme for you is "+schemes[0].scheme_name+". "
text+="This scheme matches your age and income requirements."
}else{
text+="no matching schemes were found for your eligibility."
}

return text

}

</script>

</body>
</html>
