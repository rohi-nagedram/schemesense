<!DOCTYPE html>
<html>
<head>

<title>SchemeSense</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
padding:40px;
}

input{
padding:10px;
margin:10px;
width:220px;
font-size:16px;
}

button{
padding:10px 20px;
background:#f39c12;
border:none;
color:white;
font-size:16px;
cursor:pointer;
margin:5px;
}

.card{
background:white;
margin:20px auto;
padding:20px;
width:320px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

#error{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<select id="language" onchange="resetPage()">
<option value="en">English</option>
<option value="te">Telugu</option>
<option value="hi">Hindi</option>
</select>

<h1 id="title">Find Government Schemes</h1>

<div id="error"></div>

<input id="age" placeholder="Enter Age"><br>
<input id="income" placeholder="Enter Income"><br>
<input id="state" placeholder="Enter State"><br>

<button onclick="checkSchemes()">Check Eligibility</button>
<button onclick="startVoice()">🎤 Speak Details</button>

<div id="results"></div>

<script>

const API_URL="https://965alqno7a.execute-api.us-east-1.amazonaws.com/prod/check-eligibility"


function resetPage(){

document.getElementById("age").value=""
document.getElementById("income").value=""
document.getElementById("state").value=""
document.getElementById("results").innerHTML=""
document.getElementById("error").innerHTML=""

}


function validateInputs(){

let age=document.getElementById("age").value
let income=document.getElementById("income").value
let state=document.getElementById("state").value

if(!/^\d+$/.test(age)){
showError("Age must be a number")
return false
}

if(!/^\d+$/.test(income)){
showError("Income must be a number")
return false
}

if(state.length<2){
showError("Enter a valid state")
return false
}

return true

}


function showError(msg){
document.getElementById("error").innerText=msg
}


async function checkSchemes(){

document.getElementById("error").innerHTML=""

if(!validateInputs()) return

let age=document.getElementById("age").value
let income=document.getElementById("income").value
let state=document.getElementById("state").value

let response=await fetch(API_URL,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({age:parseInt(age),income:parseInt(income),state:state})
})

let data=await response.json()

displayResults(data)

}


function displayResults(list){

let html=""

list.forEach(s=>{

html+=`
<div class="card">
<h3>${s.scheme_name}</h3>
<p>${s.benefits}</p>
<p>${s.reason}</p>
<a href="${s.apply_link}" target="_blank">
<button>Apply</button>
</a>
</div>
`

})

document.getElementById("results").innerHTML=html

}


function startVoice(){

if(!('webkitSpeechRecognition'in window)){
alert("Speech recognition not supported")
return
}

const recognition=new webkitSpeechRecognition()

recognition.lang="en-IN"
recognition.start()

recognition.onresult=function(event){

let speech=event.results[0][0].transcript.toLowerCase()

let numbers=speech.match(/\d+/g)

if(numbers && numbers.length>=2){

document.getElementById("age").value=numbers[0]
document.getElementById("income").value=numbers[1]

}

if(speech.includes("andhra")){
document.getElementById("state").value="Andhra Pradesh"
}

if(speech.includes("telangana")){
document.getElementById("state").value="Telangana"
}

if(speech.includes("tamil")){
document.getElementById("state").value="Tamil Nadu"
}

}

}

</script>

</body>
</html>
